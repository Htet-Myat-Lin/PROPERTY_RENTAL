services:
  # PostgreSQL Engine
  postgres:
    image: 'postgres:15-alpine'
    container_name: rental_postgres
    restart: always
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: 'rental_db'
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'password123'
    volumes:
      - rental-data:/var/lib/postgresql/data
    networks:
      - rental_net

  # Web-based Database Management (Adminer)
  adminer:
    image: adminer
    container_name: rental_adminer
    restart: always
    ports:
      - '8080:8080'
    networks:
      - rental_net

networks:
  rental_net:
    driver: bridge

volumes:
  rental-data:
    driver: local
